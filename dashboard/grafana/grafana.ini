[paths]
data = data
logs = logs
plugins = plugins
provisioning = provisioning

[server]
http_addr = 127.0.0.1
http_port = 3000
domain = 127.0.0.1
root_url = http://127.0.0.1:3000/

[security]
allow_embedding = true
cookie_samesite = lax

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[users]
default_theme = dark
allow_sign_up = false

[log]
mode = console
level = warn
